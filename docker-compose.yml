version: '3.8'

services:

  ############################
  # PostgreSQL
  ############################

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - microservices-net

  ############################
  # Zookeeper
  ############################

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - microservices-net

  ############################
  # Kafka
  ############################

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservices-net

  ############################
  # Config Server
  ############################

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - microservices-net

  ############################
  # Eureka Discovery
  ############################

  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    depends_on:
      - config-server
    networks:
      - microservices-net

  ############################
  # API Gateway
  ############################

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server
    networks:
      - microservices-net

  ############################
  # User Service
  ############################

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      - postgres
      - kafka
      - discovery-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/users
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka

    ports:
      - "8081:8081"
    networks:
      - microservices-net

  ############################
  # Notification Service
  ############################

  notification-service:
    build: ./notification-service
    container_name: notification-service
    depends_on:
      - kafka
      - discovery-server
    environment:

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka

    ports:
      - "8082:8082"
    networks:
      - microservices-net

############################
# Network
############################

networks:
  microservices-net:
    driver: bridge